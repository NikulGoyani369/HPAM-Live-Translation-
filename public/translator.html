<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a0a2e" />
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" type="image/png" href="https://hpam.hariprabodham.de/images/Final%20Logo.png"/>
  <link rel="apple-touch-icon" href="https://hpam.hariprabodham.de/images/Final%20Logo.png"/>
  <title>HPAM Translator Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deep:    #1a0a2e;
      --purple:  #4B2D6E;
      --gold:    #D4A017;
      --gold-lt: #f0c040;
      --cream:   #fdf6e3;
      --muted:   #a897c0;
      --green:   #2ecc71;
      --red:     #e74c3c;
      --radius:  16px;
    }

    html, body {
      height: 100%;
      background: var(--deep);
      color: var(--cream);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      min-height: 100dvh;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .badge {
      display: inline-block;
      background: rgba(212,160,23,0.2);
      border: 1px solid rgba(212,160,23,0.4);
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.3;
    }
    .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* Card */
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 28px 24px;
      width: 100%;
      max-width: 420px;
    }

    /* Mic visualizer */
    .viz-wrap {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      height: 56px;
      margin-bottom: 24px;
    }
    .bar {
      width: 6px;
      border-radius: 3px;
      background: var(--gold);
      opacity: 0.25;
      transition: height 0.05s;
      min-height: 4px;
    }
    .bar.active { opacity: 1; }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--gold);
    }
    .stat-label {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
    }

    /* Status */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.live  { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
    .dot.error { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* Mic select */
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: .5px; }
    select {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: var(--cream);
      font-size: 14px;
      appearance: none;
      cursor: pointer;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--purple), #6b3fa0);
      color: #fff;
    }
    .btn-danger {
      background: rgba(231,76,60,0.15);
      color: var(--red);
      border: 1px solid rgba(231,76,60,0.3);
      margin-top: 10px;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-mute {
      background: rgba(212,160,23,0.12);
      color: var(--gold-lt);
      border: 1px solid rgba(212,160,23,0.3);
      margin-top: 10px;
    }
    .btn-mute.muted {
      background: rgba(231,76,60,0.15);
      color: var(--red);
      border-color: rgba(231,76,60,0.3);
    }
    .hidden { display: none !important; }

    /* Share link */
    .share-box {
      margin-top: 20px;
      background: rgba(212,160,23,0.08);
      border: 1px solid rgba(212,160,23,0.2);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .share-label { font-size: 11px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    .share-url {
      font-size: 13px;
      color: var(--cream);
      word-break: break-all;
      margin-bottom: 10px;
    }
    .copy-btn {
      background: rgba(212,160,23,0.2);
      border: 1px solid rgba(212,160,23,0.35);
      color: var(--gold-lt);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }
    .copy-btn:hover { background: rgba(212,160,23,0.3); }

    .footer {
      margin-top: 24px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      text-align: center;
    }

    .pin-title { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 20px; }
    .pin-input {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: var(--cream);
      font-size: 22px;
      letter-spacing: 6px;
      text-align: center;
      margin-bottom: 16px;
    }
    .pin-input:focus { outline: none; border-color: var(--gold); }
    .pin-error { color: var(--red); font-size: 13px; text-align: center; margin-top: 12px; }
  </style>
</head>
<body>

  <div class="header">
    <img src="https://hpam.hariprabodham.de/images/Final%20Logo.png" alt="HPAM Logo" style="width:80px;height:80px;object-fit:contain;display:block;margin:0 auto 12px;" />
    <div class="badge">Translator Dashboard</div>
    <h1>HariPrabodham<br>Amrut Mahotsav 2026</h1>
    <div class="sub">Gujarati → English · Berlin, Germany</div>
  </div>

  <!-- PIN Screen (shown on load) -->
  <div id="pinScreen" class="card">
    <p class="pin-title">Enter translator PIN to continue</p>
    <input
      type="password"
      id="pinInput"
      class="pin-input"
      placeholder="••••"
      inputmode="numeric"
      maxlength="20"
      autocomplete="off"
    />
    <button class="btn btn-primary" id="unlockBtn">🔓 Unlock</button>
    <div id="pinError" class="pin-error hidden"></div>
  </div>

  <!-- Dashboard (hidden until PIN verified) -->
  <div id="dashboard" class="card hidden">
    <!-- Mic visualizer bars -->
    <div class="viz-wrap" id="vizWrap">
      <div class="bar" style="height:8px"></div>
      <div class="bar" style="height:14px"></div>
      <div class="bar" style="height:20px"></div>
      <div class="bar" style="height:30px"></div>
      <div class="bar" style="height:40px"></div>
      <div class="bar" style="height:52px"></div>
      <div class="bar" style="height:40px"></div>
      <div class="bar" style="height:30px"></div>
      <div class="bar" style="height:20px"></div>
      <div class="bar" style="height:14px"></div>
      <div class="bar" style="height:8px"></div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="listenerCount">0</div>
        <div class="stat-label">Listeners</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="durationEl">00:00</div>
        <div class="stat-label">Duration</div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span id="statusMsg">Select microphone and go live</span>
    </div>

    <!-- Mic selector -->
    <div class="field" id="micField">
      <label>🎙 Microphone</label>
      <select id="micSelect"><option value="">Loading devices…</option></select>
    </div>

    <!-- Go live / stop -->
    <button class="btn btn-primary" id="goLiveBtn">🎙 Go Live</button>
    <button class="btn btn-mute hidden" id="muteBtn">🔇 Mute</button>
    <button class="btn btn-danger hidden" id="stopBtn">⏹ End Broadcast</button>

    <!-- Share box (shown when live) -->
    <div class="share-box hidden" id="shareBox">
      <div class="share-label">🔗 Listener Link</div>
      <div class="share-url" id="shareUrl"></div>
      <button class="copy-btn" id="copyBtn">Copy Link</button>
    </div>
  </div>

  <div class="footer">HPAM 2026 · hariprabodham.de</div>

  <script src="/dist/translator.js"></script>
</body>
</html>
